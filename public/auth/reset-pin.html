              />
              <input
                type="password"
                inputmode="numeric"

                class="pin-new h-11 w-10 rounded-xl border border-gray-200 bg-white text-center text-xl font-bold shadow-sm outline-none transition-all focus:border-gray-400 focus:ring-2 focus:ring-[#A8E034]/20 sm:h-12 sm:w-11"
                required
              />
              <input
                type="password"
                inputmode="numeric"
                pattern="[0-9]*"
                maxlength="1"
                class="pin-new h-11 w-10 rounded-xl border border-gray-200 bg-white text-center text-xl font-bold shadow-sm outline-none transition-all focus:border-gray-400 focus:ring-2 focus:ring-[#A8E034]/20 sm:h-12 sm:w-11"
                required
              />
              <input
                type="password"
                inputmode="numeric"
                pattern="[0-9]*"
                maxlength="1"
                class="pin-new h-11 w-10 rounded-xl border border-gray-200 bg-white text-center text-xl font-bold shadow-sm outline-none transition-all focus:border-gray-400 focus:ring-2 focus:ring-[#A8E034]/20 sm:h-12 sm:w-11"
                required
              />
              <input
                type="password"
                inputmode="numeric"
                pattern="[0-9]*"
                maxlength="1"
                class="pin-new h-11 w-10 rounded-xl border border-gray-200 bg-white text-center text-xl font-bold shadow-sm outline-none transition-all focus:border-gray-400 focus:ring-2 focus:ring-[#A8E034]/20 sm:h-12 sm:w-11"
                required
              />
              <input
                type="password"
                inputmode="numeric"
                pattern="[0-9]*"
                maxlength="1"
                class="pin-new h-11 w-10 rounded-xl border border-gray-200 bg-white text-center text-xl font-bold shadow-sm outline-none transition-all focus:border-gray-400 focus:ring-2 focus:ring-[#A8E034]/20 sm:h-12 sm:w-11"

          <!-- Konfirmasi PIN Baru -->
          <div>
            <label
              class="mb-3 block text-center text-xs font-bold text-gray-800"

            >
            <div

              <input

                inputmode="numeric"
                pattern="[0-9]*"
                maxlength="1"
                class="pin-confirm h-11 w-10 rounded-xl border border-gray-200 bg-white text-center text-xl font-bold shadow-sm outline-none transition-all focus:border-gray-400 focus:ring-2 focus:ring-[#A8E034]/20 sm:h-12 sm:w-11"

          <!-- Button Simpan -->

        </div>

    </div>

    <!-- Script Interaktif PIN Boxes -->
    <script>
      function setupPinInputs(className, finalInputId) {
        const boxes = document.querySelectorAll(`.${className}`);
        const finalInput = document.getElementById(finalInputId);

        boxes.forEach((box, index) => {
          box.addEventListener("input", (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, "");

            if (e.target.value !== "") {
              if (index < boxes.length - 1) {
                boxes[index + 1].focus();
              }
            }
            updateFinal();
          });

          box.addEventListener("keydown", (e) => {
            if (e.key === "Backspace" && e.target.value === "") {
              if (index > 0) {
                boxes[index - 1].focus();
                boxes[index - 1].value = "";
              }
            }
            updateFinal();
          });
        });

        function updateFinal() {
          let code = "";
          boxes.forEach((box) => {
            code += box.value;
          });
          finalInput.value = code;
        }
      }

      setupPinInputs("pin-new", "final-pin-new");
      setupPinInputs("pin-confirm", "final-pin-confirm");
    </script>
  </body>

<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Identitas Registrasi - SnapCash</title>
    <!-- Load Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Load Tailwind CSS -->
    <link rel="stylesheet" href="../../dist/css/style.css" />
  </head>
  <body
    class="flex min-h-screen items-center justify-center bg-[#F4F5F7] font-sans md:px-4 md:py-8"
  >
    <div
      class="flex min-h-screen w-full flex-col justify-between rounded-none border border-gray-100/50 bg-white p-8 shadow-[0_8px_30px_rgb(0,0,0,0.03)] md:min-h-[600px] md:max-w-[560px] md:rounded-[24px] md:p-12"
    >
      <div>
        <!-- Header -->
        <div class="text-center">
          <h1
            class="text-xl font-bold tracking-tight text-gray-900 md:text-2xl"
          >
            Buat Akun SnapCash
          </h1>
          <p class="mt-2 text-xs font-medium text-gray-500 md:text-sm">
            Mulai langkahmu menuju kebebasan dan kemudahan finansial.
          </p>
        </div>

        <!-- Stepper (4 Steps) -->
        <div
          class="relative mb-8 mt-6 flex items-start justify-between px-6 py-4"
        >
          <!-- Connector Line -->
          <div
            class="absolute left-[38px] right-[38px] top-[30px] z-0 h-[2px] -translate-y-1/2"
          >
            <div class="h-full w-full rounded-full bg-gray-200"></div>
            <div
              class="absolute left-0 top-0 h-full rounded-full bg-[#A8E034] transition-all duration-300"
              style="width: 0%"
            ></div>
          </div>

          <!-- Step 1: Identitas (Active) -->
          <div class="relative z-10 flex w-16 flex-col items-center">
            <div
              class="flex h-7 w-7 items-center justify-center rounded-full bg-[#A8E034] text-xs font-bold text-gray-900 shadow-sm shadow-[#A8E034]/20"
            >
              1
            </div>
            <span
              class="mt-2 text-center text-[10px] font-semibold text-gray-900"
              >Identitas</span
            >
          </div>

          <!-- Step 2: Keamanan (Inactive) -->
          <div class="relative z-10 flex w-16 flex-col items-center">
            <div
              class="flex h-7 w-7 items-center justify-center rounded-full border border-gray-200 bg-white text-xs font-medium text-gray-400"
            >
              2
            </div>
            <span class="mt-2 text-center text-[10px] font-medium text-gray-400"
              >Keamanan</span
            >
          </div>

          <!-- Step 3: Verifikasi (Inactive) -->
          <div class="relative z-10 flex w-16 flex-col items-center">
            <div
              class="flex h-7 w-7 items-center justify-center rounded-full border border-gray-200 bg-white text-xs font-medium text-gray-400"
            >
              3
            </div>
            <span class="mt-2 text-center text-[10px] font-medium text-gray-400"
              >Verifikasi</span
            >
          </div>

          <!-- Step 4: Selesai (Inactive) -->
          <div class="relative z-10 flex w-16 flex-col items-center">
            <div
              class="flex h-7 w-7 items-center justify-center rounded-full border border-gray-200 bg-white text-xs font-medium text-gray-400"
            >
              4
            </div>
            <span class="mt-2 text-center text-[10px] font-medium text-gray-400"
              >Selesai</span
            >
          </div>
        </div>

        <!-- Form Step 1 -->
        <form
          class="mt-6 space-y-5"
          action="register-security.html"
          method="GET"
        >
          <!-- Nama Lengkap -->
          <div>
            <label
              for="nama-lengkap"
              class="mb-2 block text-xs font-bold text-gray-800"
              >Nama Lengkap</label
            >
            <div
              class="relative rounded-xl border border-gray-200 bg-white transition-all focus-within:border-gray-400 focus-within:ring-2 focus-within:ring-[#A8E034]/20"
            >
              <div
                class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-5 w-5 text-gray-400"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="1.8"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                  />
                </svg>
              </div>
              <input
                type="text"
                id="nama-lengkap"
                name="nama-lengkap"
                class="block w-full rounded-xl bg-transparent py-3.5 pl-11 pr-4 text-sm text-gray-800 placeholder-gray-400 outline-none"
                placeholder="Contoh: Budi Santoso"
                required
              />
            </div>
          </div>

          <!-- Alamat Email -->
          <div>
            <label
              for="email"
              class="mb-2 block text-xs font-bold text-gray-800"
              >Alamat Email</label
            >
            <div
              class="relative rounded-xl border border-gray-200 bg-white transition-all focus-within:border-gray-400 focus-within:ring-2 focus-within:ring-[#A8E034]/20"
            >
              <div
                class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-5 w-5 text-gray-400"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="1.8"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
                  />
                </svg>
              </div>
              <input
                type="email"
                id="email"
                name="email"
                class="block w-full rounded-xl bg-transparent py-3.5 pl-11 pr-4 text-sm text-gray-800 placeholder-gray-400 outline-none"
                placeholder="nama@email.com"
                required
              />
            </div>
          </div>

          <!-- Nomor WhatsApp / HP -->
          <div>
            <label
              for="whatsapp"
              class="mb-2 block text-xs font-bold text-gray-800"
              >Nomor WhatsApp / HP</label
            >
            <div
              class="flex overflow-hidden rounded-xl border border-gray-200 bg-white transition-all focus-within:border-gray-400 focus-within:ring-2 focus-within:ring-[#A8E034]/20"
            >
              <div
                class="flex min-w-[60px] items-center justify-center border-r border-gray-200 bg-gray-50 px-4 text-sm font-semibold text-gray-700"
              >
                +62
              </div>
              <input
                type="tel"
                id="whatsapp"
                name="whatsapp"
                class="block w-full bg-transparent px-4 py-3.5 text-sm text-gray-800 placeholder-gray-400 outline-none"
                placeholder="812-3456-7890"
                pattern="[0-9\- ]{8,15}"
                required
              />
            </div>
          </div>

          <!-- Button Lanjut -->
          <button
            type="submit"
            class="mt-8 flex w-full items-center justify-center gap-2 rounded-xl bg-[#A8E034] px-4 py-3.5 font-bold text-gray-900 shadow-sm transition-colors hover:bg-[#97cf29] focus:outline-none focus:ring-2 focus:ring-[#A8E034]/40 active:bg-[#86b824]"
          >
            <span>Lanjut ke Keamanan</span>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M14 5l7 7m0 0l-7 7m7-7H3"
              />
            </svg>
          </button>
        </form>

        <!-- Sudah punya akun? Masuk -->
        <div class="mt-6 text-center">
          <p class="text-xs font-medium text-gray-500">
            Sudah punya akun?
            <a href="login.html" class="font-bold text-gray-900 hover:underline"
              >Masuk di sini</a
            >
          </p>
        </div>
      </div>

      <!-- Footer Keamanan -->
      <div
        class="mt-8 flex items-center justify-center gap-1.5 border-t border-gray-50 pt-4 text-[10px] font-medium text-gray-400"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-3.5 w-3.5 text-gray-400"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z"
          />
        </svg>
        <span>Data dilindungi enkripsi end-to-end</span>
      </div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snapcash E-Wallet</title>
    <!-- Load Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Load Tailwind CSS -->
    <link rel="stylesheet" href="./dist/css/style.css" />
  </head>
  <body
    class="flex min-h-screen items-center justify-center bg-wallet-softgray font-sans"
  >
    <div
      class="w-full max-w-sm rounded-2xl bg-wallet-charcoal p-8 text-center shadow-xl"
    >
      <h1 class="mb-2 text-2xl font-bold text-white">Snapcash</h1>
      <p class="mb-6 text-sm text-wallet-softgray">
        Your modern E-Wallet solution.
      </p>

      <div class="mb-6 rounded-xl border border-white/5 bg-white/10 p-4">
        <p class="mb-1 text-sm text-gray-300">Total Balance</p>
        <p class="text-3xl font-bold text-wallet-lime">$12,450.00</p>
      </div>

      <button
        class="flex w-full items-center justify-center gap-2 rounded-xl bg-wallet-lime py-3 font-semibold text-wallet-charcoal transition-all hover:bg-opacity-90"
      >
        <!-- We will add icons later, placeholder for now -->
        <span>Send Money</span>
      </button>

      <div class="mt-4 flex flex-col gap-2">
        <a
          href="auth/login.html"
          class="text-xs font-semibold text-wallet-lime hover:underline"
          >Login to Your Account</a
        >
        <a
          href="auth/register.html"
          class="text-xs font-semibold text-gray-400 hover:text-gray-300 hover:underline"
          >Register New Account</a
        >
      </div>
    </div>

    <script src="./src/js/app.js"></script>
  </body>
</html>

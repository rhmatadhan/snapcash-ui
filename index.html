<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snapcash E-Wallet</title>
    <!-- Load Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Load Tailwind CSS -->
    <link rel="stylesheet" href="./dist/css/style.css" />
  </head>
  <body
    class="bg-wallet-softgray flex min-h-screen items-center justify-center font-sans"
  >
    <div
      class="bg-wallet-charcoal w-full max-w-sm rounded-2xl p-8 text-center shadow-xl"
    >
      <h1 class="mb-2 text-2xl font-bold text-white">Snapcash</h1>
      <p class="text-wallet-softgray mb-6 text-sm">
        Your modern E-Wallet solution.
      </p>

      <div class="mb-6 rounded-xl border border-white/5 bg-white/10 p-4">
        <p class="mb-1 text-sm text-gray-300">Total Balance</p>
        <p class="text-wallet-lime text-3xl font-bold">$12,450.00</p>
      </div>

      <button
        class="bg-wallet-lime text-wallet-charcoal hover:bg-opacity-90 flex w-full items-center justify-center gap-2 rounded-xl py-3 font-semibold transition-all"
      >
        <!-- We will add icons later, placeholder for now -->
        <span>Send Money</span>
      </button>
    </div>

    <script src="./src/js/app.js"></script>
  </body>
</html>

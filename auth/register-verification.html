<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verifikasi Email - SnapCash</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../dist/css/style.css" />
  </head>
  <body
    class="flex min-h-screen items-center justify-center bg-[#F4F5F7] font-sans md:px-4 md:py-8"
  >
    <div
      class="flex min-h-screen w-full flex-col justify-between rounded-none border border-gray-100/50 bg-white p-8 shadow-[0_8px_30px_rgb(0,0,0,0.03)] md:min-h-[600px] md:max-w-[560px] md:rounded-[24px] md:p-12"
    >
      <div>
        <div class="text-center">
          <h1
            class="text-xl font-bold tracking-tight text-gray-900 md:text-2xl"
          >
            Verifikasi Email Anda
          </h1>
          <p class="mt-2 text-xs font-medium text-gray-500 md:text-sm">
            Kami telah mengirimkan 4 digit kode OTP ke email Anda.
          </p>
        </div>

        <!-- Stepper (4 Steps) -->
        <div
          class="relative mb-8 mt-6 flex items-start justify-between px-6 py-4"
        >
          <!-- Connector Line -->
          <div
            class="absolute left-[38px] right-[38px] top-[30px] z-0 h-[2px] -translate-y-1/2"
          >
            <div class="h-full w-full rounded-full bg-gray-200"></div>
            <div
              class="absolute left-0 top-0 h-full rounded-full bg-[#A8E034] transition-all duration-300"
              style="width: 66.66%"
            ></div>
          </div>

          <!-- Step 1: Identitas (Completed) -->
          <div class="relative z-10 flex w-16 flex-col items-center">
            <div
              class="flex h-7 w-7 items-center justify-center rounded-full bg-[#A8E034] text-gray-900 shadow-sm"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="3"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M5 13l4 4L19 7"
                />
              </svg>
            </div>
            <span class="mt-2 text-center text-[10px] font-medium text-gray-500"
              >Identitas</span
            >
          </div>

          <!-- Step 2: Keamanan (Completed) -->
          <div class="relative z-10 flex w-16 flex-col items-center">
            <div
              class="flex h-7 w-7 items-center justify-center rounded-full bg-[#A8E034] text-gray-900 shadow-sm"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="3"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M5 13l4 4L19 7"
                />
              </svg>
            </div>
            <span class="mt-2 text-center text-[10px] font-medium text-gray-500"
              >Keamanan</span
            >
          </div>

          <!-- Step 3: Verifikasi (Active) -->
          <div class="relative z-10 flex w-16 flex-col items-center">
            <div
              class="flex h-7 w-7 items-center justify-center rounded-full bg-[#A8E034] text-xs font-bold text-gray-900 shadow-sm shadow-[#A8E034]/20"
            >
              3
            </div>
            <span
              class="mt-2 text-center text-[10px] font-semibold text-gray-900"
              >Verifikasi</span
            >
          </div>

          <!-- Step 4: Selesai (Inactive) -->
          <div class="relative z-10 flex w-16 flex-col items-center">
            <div
              class="flex h-7 w-7 items-center justify-center rounded-full border border-gray-200 bg-white text-xs font-medium text-gray-400"
            >
              4
            </div>
            <span class="mt-2 text-center text-[10px] font-medium text-gray-400"
              >Selesai</span
            >
          </div>
        </div>

        <!-- Form Step 3 -->
        <form
          class="mt-6 space-y-6"
          action="register-success.html"
          method="GET"
        >
          <!-- OTP Boxes -->
          <div class="py-4">
            <div class="flex justify-center gap-3 sm:gap-4" id="otp-container">
              <input
                type="text"
                maxlength="1"
                class="otp-box h-16 w-14 rounded-xl border-2 border-gray-200 bg-white text-center text-3xl font-bold shadow-sm outline-none transition-all focus:border-[#A8E034] focus:ring-4 focus:ring-[#A8E034]/20 sm:h-20 sm:w-16"
                required
              />
              <input
                type="text"
                maxlength="1"
                class="otp-box h-16 w-14 rounded-xl border-2 border-gray-200 bg-white text-center text-3xl font-bold shadow-sm outline-none transition-all focus:border-[#A8E034] focus:ring-4 focus:ring-[#A8E034]/20 sm:h-20 sm:w-16"
                required
              />
              <input
                type="text"
                maxlength="1"
                class="otp-box h-16 w-14 rounded-xl border-2 border-gray-200 bg-white text-center text-3xl font-bold shadow-sm outline-none transition-all focus:border-[#A8E034] focus:ring-4 focus:ring-[#A8E034]/20 sm:h-20 sm:w-16"
                required
              />
              <input
                type="text"
                maxlength="1"
                class="otp-box h-16 w-14 rounded-xl border-2 border-gray-200 bg-white text-center text-3xl font-bold shadow-sm outline-none transition-all focus:border-[#A8E034] focus:ring-4 focus:ring-[#A8E034]/20 sm:h-20 sm:w-16"
                required
              />
            </div>
          </div>

          <div class="text-center">
            <p class="text-xs font-medium text-gray-500">
              Belum menerima kode?
              <button
                type="button"
                class="font-bold text-gray-900 hover:underline"
              >
                Kirim Ulang (00:59)
              </button>
            </p>
          </div>

          <button
            type="submit"
            class="mt-4 flex w-full items-center justify-center gap-2 rounded-xl bg-[#A8E034] px-4 py-3.5 font-bold text-gray-900 shadow-sm transition-colors hover:bg-[#97cf29] focus:outline-none focus:ring-2 focus:ring-[#A8E034]/40 active:bg-[#86b824]"
          >
            <span>Verifikasi & Buat Akun</span>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
              />
            </svg>
          </button>
        </form>

        <div class="mt-6 text-center">
          <a
            href="register-security.html"
            class="inline-flex items-center gap-2 text-xs font-bold text-gray-800 transition-colors hover:text-gray-950"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-3.5 w-3.5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M10 19l-7-7m0 0l7-7m-7 7h18"
              />
            </svg>
            <span>Kembali ke Langkah Sebelumnya</span>
          </a>
        </div>
      </div>
    </div>

    <!-- Script Interaktif OTP Boxes -->
    <script>
      const otpBoxes = document.querySelectorAll(".otp-box");

      otpBoxes.forEach((box, index) => {
        box.addEventListener("input", (e) => {
          // Hanya izinkan angka
          e.target.value = e.target.value.replace(/[^0-9]/g, "");

          if (e.target.value !== "") {
            // Pindah ke kotak berikutnya jika ada
            if (index < otpBoxes.length - 1) {
              otpBoxes[index + 1].focus();
            }
          }
        });

        box.addEventListener("keydown", (e) => {
          if (e.key === "Backspace" && e.target.value === "") {
            // Jika menekan backspace dan kosong, pindah ke kiri
            if (index > 0) {
              otpBoxes[index - 1].focus();
              otpBoxes[index - 1].value = "";
            }
          }
        });

        // Memungkinkan paste text (e.g. 1234 dicolas langsung)
        box.addEventListener("paste", (e) => {
          e.preventDefault();
          const text = (e.originalEvent || e).clipboardData
            .getData("text/plain")
            .replace(/[^0-9]/g, "")
            .slice(0, 4);
          for (let i = 0; i < text.length; i++) {
            if (index + i < otpBoxes.length) {
              otpBoxes[index + i].value = text[i];
              if (index + i < otpBoxes.length - 1) {
                otpBoxes[index + i + 1].focus();
              } else {
                otpBoxes[index + i].focus();
              }
            }
          }
        });
      });
    </script>
  </body>
</html>

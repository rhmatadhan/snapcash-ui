<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verifikasi Email - SnapCash</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../dist/css/style.css" />
  </head>
  <body class="bg-[#F4F5F7] flex min-h-screen items-center justify-center font-sans px-4 py-8">
    <div class="bg-white w-full max-w-[560px] rounded-[24px] p-8 md:p-12 shadow-[0_8px_30px_rgb(0,0,0,0.03)] border border-gray-100/50">
      
      <div class="text-center">
        <h1 class="text-xl md:text-2xl font-bold text-gray-900 tracking-tight">Verifikasi Email Anda</h1>
        <p class="text-xs md:text-sm text-gray-500 mt-2 font-medium">Kami telah mengirimkan 4 digit kode OTP ke email Anda.</p>
      </div>

      <!-- Stepper (4 Steps) -->
      <div class="flex items-center justify-center gap-1 md:gap-2 mt-6 py-4">
        <!-- Step 1: Identitas (Completed) -->
        <div class="flex items-center">
          <div class="w-6 h-6 md:w-7 md:h-7 rounded-full bg-[#A8E034] text-gray-900 flex items-center justify-center shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 md:h-4 md:w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
          </div>
          <span class="text-[10px] md:text-xs font-semibold text-gray-900 ml-1.5 md:ml-2">Identitas</span>
        </div>

        <div class="w-4 md:w-8 h-[1px] bg-[#A8E034] mx-1 md:mx-2"></div>

        <!-- Step 2: Keamanan (Completed) -->
        <div class="flex items-center">
          <div class="w-6 h-6 md:w-7 md:h-7 rounded-full bg-[#A8E034] text-gray-900 flex items-center justify-center shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 md:h-4 md:w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
          </div>
          <span class="text-[10px] md:text-xs font-semibold text-gray-900 ml-1.5 md:ml-2 hidden sm:inline">Keamanan</span>
        </div>

        <div class="w-4 md:w-8 h-[1px] bg-[#A8E034] mx-1 md:mx-2"></div>

        <!-- Step 3: Verifikasi (Active) -->
        <div class="flex items-center">
          <div class="w-6 h-6 md:w-7 md:h-7 rounded-full bg-[#A8E034] text-gray-900 font-bold flex items-center justify-center text-[10px] md:text-xs shadow-sm shadow-[#A8E034]/20">
            3
          </div>
          <span class="text-[10px] md:text-xs font-semibold text-gray-900 ml-1.5 md:ml-2 hidden sm:inline">Verifikasi</span>
        </div>

        <div class="w-4 md:w-8 h-[1px] bg-gray-200 mx-1 md:mx-2"></div>

        <!-- Step 4: Selesai -->
        <div class="flex items-center">
          <div class="w-6 h-6 md:w-7 md:h-7 rounded-full border border-gray-200 text-gray-400 font-medium flex items-center justify-center text-[10px] md:text-xs bg-white">
            4
          </div>
        </div>
      </div>

      <!-- Form Step 3 -->
      <form class="space-y-6 mt-6" action="register-success.html" method="GET">
        
        <!-- OTP Boxes -->
        <div class="py-4">
          <div class="flex justify-center gap-3 sm:gap-4" id="otp-container">
            <input type="text" maxlength="1" class="otp-box w-14 h-16 sm:w-16 sm:h-20 text-center text-3xl font-bold rounded-xl border-2 border-gray-200 focus:border-[#A8E034] focus:ring-4 focus:ring-[#A8E034]/20 outline-none bg-white transition-all shadow-sm" required>
            <input type="text" maxlength="1" class="otp-box w-14 h-16 sm:w-16 sm:h-20 text-center text-3xl font-bold rounded-xl border-2 border-gray-200 focus:border-[#A8E034] focus:ring-4 focus:ring-[#A8E034]/20 outline-none bg-white transition-all shadow-sm" required>
            <input type="text" maxlength="1" class="otp-box w-14 h-16 sm:w-16 sm:h-20 text-center text-3xl font-bold rounded-xl border-2 border-gray-200 focus:border-[#A8E034] focus:ring-4 focus:ring-[#A8E034]/20 outline-none bg-white transition-all shadow-sm" required>
            <input type="text" maxlength="1" class="otp-box w-14 h-16 sm:w-16 sm:h-20 text-center text-3xl font-bold rounded-xl border-2 border-gray-200 focus:border-[#A8E034] focus:ring-4 focus:ring-[#A8E034]/20 outline-none bg-white transition-all shadow-sm" required>
          </div>
        </div>

        <div class="text-center">
          <p class="text-xs text-gray-500 font-medium">Belum menerima kode? <button type="button" class="text-gray-900 font-bold hover:underline">Kirim Ulang (00:59)</button></p>
        </div>

        <button type="submit" class="w-full bg-[#A8E034] hover:bg-[#97cf29] active:bg-[#86b824] text-gray-900 font-bold py-3.5 px-4 rounded-xl flex items-center justify-center gap-2 mt-4 transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-[#A8E034]/40">
          <span>Verifikasi & Buat Akun</span>
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </button>
      </form>

      <div class="text-center mt-6">
        <a href="register-security.html" class="inline-flex items-center gap-2 text-xs font-bold text-gray-800 hover:text-gray-950 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
          <span>Kembali ke Langkah Sebelumnya</span>
        </a>
      </div>

    </div>

    <!-- Script Interaktif OTP Boxes -->
    <script>
      const otpBoxes = document.querySelectorAll('.otp-box');

      otpBoxes.forEach((box, index) => {
        box.addEventListener('input', (e) => {
          // Hanya izinkan angka
          e.target.value = e.target.value.replace(/[^0-9]/g, '');
          
          if (e.target.value !== '') {
            // Pindah ke kotak berikutnya jika ada
            if (index < otpBoxes.length - 1) {
              otpBoxes[index + 1].focus();
            }
          }
        });

        box.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && e.target.value === '') {
            // Jika menekan backspace dan kosong, pindah ke kiri
            if (index > 0) {
              otpBoxes[index - 1].focus();
              otpBoxes[index - 1].value = '';
            }
          }
        });
        
        // Memungkinkan paste text (e.g. 1234 dicolas langsung)
        box.addEventListener('paste', (e) => {
          e.preventDefault();
          const text = (e.originalEvent || e).clipboardData.getData('text/plain').replace(/[^0-9]/g, '').slice(0, 4);
          for (let i = 0; i < text.length; i++) {
            if (index + i < otpBoxes.length) {
              otpBoxes[index + i].value = text[i];
              if (index + i < otpBoxes.length - 1) {
                otpBoxes[index + i + 1].focus();
              } else {
                otpBoxes[index + i].focus();
              }
            }
          }
        });
      });
    </script>
  </body>
</html>

<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masukkan PIN - SnapCash</title>
    <!-- Load Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Load Tailwind CSS -->
    <link rel="stylesheet" href="../dist/css/style.css" />
  </head>
  <body
    class="flex min-h-screen items-center justify-center bg-[#F4F5F7] font-sans md:px-4 md:py-8"
  >
    <div
      class="flex min-h-screen w-full flex-col justify-between rounded-none border border-gray-100/50 bg-white p-8 shadow-[0_8px_30px_rgb(0,0,0,0.03)] md:min-h-[600px] md:max-w-[560px] md:rounded-[24px] md:p-12"
    >
      <div>
        <!-- Logo SnapCash -->
        <div class="mb-6 flex items-center justify-center">
          <span class="text-2xl font-extrabold tracking-tight text-gray-900">
            SnapCash<span class="text-[#A8E034]">.</span>
          </span>
        </div>

        <!-- Header -->
        <div class="mb-8 text-center">
          <h1
            class="text-xl font-bold tracking-tight text-gray-900 md:text-2xl"
          >
            Masukkan PIN
          </h1>
          <p class="mt-2 text-xs font-medium text-gray-500 md:text-sm">
            Silakan masukkan 6 digit PIN keamanan akun Anda
          </p>
        </div>

        <!-- Form PIN -->
        <form
          class="mt-6 flex flex-col items-stretch space-y-6"
          action="../index.html"
          method="GET"
        >
          <div class="py-4">
            <div class="flex justify-center gap-2 sm:gap-3" id="pin-container">
              <input
                type="password"
                inputmode="numeric"
                pattern="[0-9]*"
                maxlength="1"
                class="pin-box h-12 w-10 rounded-xl border border-gray-200 bg-white text-center text-xl font-bold shadow-sm outline-none transition-all focus:border-gray-400 focus:ring-2 focus:ring-[#A8E034]/20 sm:h-14 sm:w-12"
                required
                autofocus
              />
              <input
                type="password"
                inputmode="numeric"
                pattern="[0-9]*"
                maxlength="1"
                class="pin-box h-12 w-10 rounded-xl border border-gray-200 bg-white text-center text-xl font-bold shadow-sm outline-none transition-all focus:border-gray-400 focus:ring-2 focus:ring-[#A8E034]/20 sm:h-14 sm:w-12"
                required
              />
              <input
                type="password"
                inputmode="numeric"
                pattern="[0-9]*"
                maxlength="1"
                class="pin-box h-12 w-10 rounded-xl border border-gray-200 bg-white text-center text-xl font-bold shadow-sm outline-none transition-all focus:border-gray-400 focus:ring-2 focus:ring-[#A8E034]/20 sm:h-14 sm:w-12"
                required
              />
              <input
                type="password"
                inputmode="numeric"
                pattern="[0-9]*"
                maxlength="1"
                class="pin-box h-12 w-10 rounded-xl border border-gray-200 bg-white text-center text-xl font-bold shadow-sm outline-none transition-all focus:border-gray-400 focus:ring-2 focus:ring-[#A8E034]/20 sm:h-14 sm:w-12"
                required
              />
              <input
                type="password"
                inputmode="numeric"
                pattern="[0-9]*"
                maxlength="1"
                class="pin-box h-12 w-10 rounded-xl border border-gray-200 bg-white text-center text-xl font-bold shadow-sm outline-none transition-all focus:border-gray-400 focus:ring-2 focus:ring-[#A8E034]/20 sm:h-14 sm:w-12"
                required
              />
              <input
                type="password"
                inputmode="numeric"
                pattern="[0-9]*"
                maxlength="1"
                class="pin-box h-12 w-10 rounded-xl border border-gray-200 bg-white text-center text-xl font-bold shadow-sm outline-none transition-all focus:border-gray-400 focus:ring-2 focus:ring-[#A8E034]/20 sm:h-14 sm:w-12"
                required
              />
            </div>
            <!-- Hidden Input untuk menyimpan hasil akhir PIN -->
            <input type="hidden" name="pin" id="final-pin" />
          </div>

          <!-- Lupa PIN Link -->
          <div class="text-center">
            <a
              href="forgot-pin.html"
              class="text-xs font-bold text-[#86b824] transition-colors hover:text-[#75a31f]"
              >Lupa PIN?</a
            >
          </div>

          <!-- Button Masuk -->
          <button
            type="submit"
            class="mt-8 flex w-full items-center justify-center gap-2 rounded-xl bg-[#A8E034] px-4 py-3.5 font-bold text-gray-900 shadow-sm transition-colors hover:bg-[#97cf29] focus:outline-none focus:ring-2 focus:ring-[#A8E034]/40 active:bg-[#86b824]"
          >
            <span>Masuk ke Akun</span>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
              />
            </svg>
          </button>
        </form>

        <!-- Back Button -->
        <div class="mt-6 text-center">
          <a
            href="login.html"
            class="inline-flex items-center gap-2 text-xs font-bold text-gray-800 transition-colors hover:text-gray-950"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-3.5 w-3.5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M10 19l-7-7m0 0l7-7m-7 7h18"
              />
            </svg>
            <span>Kembali ke Halaman Sebelumnya</span>
          </a>
        </div>
      </div>

      <!-- Footer Keamanan -->
      <div
        class="mt-8 flex flex-col items-center gap-4 border-t border-gray-50 pt-6 text-center"
      >
        <div
          class="flex items-center gap-1.5 text-[10px] font-medium text-gray-400"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-3.5 w-3.5 text-gray-400"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z"
            />
          </svg>
          <span>Dilindungi oleh Enkripsi 256-bit SnapCash Guard</span>
        </div>
      </div>
    </div>

    <!-- Script Interaktif PIN Boxes -->
    <script>
      const pinBoxes = document.querySelectorAll(".pin-box");
      const finalPinInput = document.getElementById("final-pin");

      pinBoxes.forEach((box, index) => {
        box.addEventListener("input", (e) => {
          // Hanya izinkan angka
          e.target.value = e.target.value.replace(/[^0-9]/g, "");

          if (e.target.value !== "") {
            // Pindah ke kotak berikutnya jika ada
            if (index < pinBoxes.length - 1) {
              pinBoxes[index + 1].focus();
            }
          }
          updateFinalPin();
        });

        box.addEventListener("keydown", (e) => {
          if (e.key === "Backspace" && e.target.value === "") {
            // Jika menekan backspace dan kosong, pindah ke kiri
            if (index > 0) {
              pinBoxes[index - 1].focus();
              pinBoxes[index - 1].value = "";
            }
          }
          updateFinalPin();
        });
      });

      function updateFinalPin() {
        let pin = "";
        pinBoxes.forEach((box) => {
          pin += box.value;
        });
        finalPinInput.value = pin;
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keamanan Registrasi - SnapCash</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../dist/css/style.css" />
  </head>
  <body
    class="flex min-h-screen items-center justify-center bg-[#F4F5F7] font-sans md:px-4 md:py-8"
  >
    <div
      class="flex w-full min-h-screen md:min-h-[600px] md:max-w-[560px] flex-col justify-between rounded-none md:rounded-[24px] border border-gray-100/50 bg-white p-8 shadow-[0_8px_30px_rgb(0,0,0,0.03)] md:p-12"
    >
      <div>
      <div class="text-center">
        <h1 class="text-xl font-bold tracking-tight text-gray-900 md:text-2xl">
          Buat Akun SnapCash
        </h1>
        <p class="mt-2 text-xs font-medium text-gray-500 md:text-sm">
          Mulai langkahmu menuju kebebasan dan kemudahan finansial.
        </p>
      </div>

      <!-- Stepper (4 Steps) -->
      <div class="relative mt-6 mb-8 flex items-start justify-between px-6 py-4">
        <!-- Connector Line -->
        <div class="absolute left-[38px] right-[38px] top-[30px] h-[2px] -translate-y-1/2 z-0">
          <div class="w-full h-full bg-gray-200 rounded-full"></div>
          <div class="absolute top-0 left-0 h-full bg-[#A8E034] rounded-full transition-all duration-300" style="width: 33.33%;"></div>
        </div>

        <!-- Step 1: Identitas (Completed) -->
        <div class="relative z-10 flex flex-col items-center w-16">
          <div
            class="flex h-7 w-7 items-center justify-center rounded-full bg-[#A8E034] text-gray-900 shadow-sm"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="3"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M5 13l4 4L19 7"
              />
            </svg>
          </div>
          <span class="mt-2 text-[10px] font-medium text-gray-500 text-center"
            >Identitas</span
          >
        </div>

        <!-- Step 2: Keamanan (Active) -->
        <div class="relative z-10 flex flex-col items-center w-16">
          <div
            class="flex h-7 w-7 items-center justify-center rounded-full bg-[#A8E034] text-xs font-bold text-gray-900 shadow-sm shadow-[#A8E034]/20"
          >
            2
          </div>
          <span class="mt-2 text-[10px] font-semibold text-gray-900 text-center"
            >Keamanan</span
          >
        </div>

        <!-- Step 3: Verifikasi (Inactive) -->
        <div class="relative z-10 flex flex-col items-center w-16">
          <div
            class="flex h-7 w-7 items-center justify-center rounded-full border border-gray-200 bg-white text-xs font-medium text-gray-400"
          >
            3
          </div>
          <span class="mt-2 text-[10px] font-medium text-gray-400 text-center"
            >Verifikasi</span
          >
        </div>

        <!-- Step 4: Selesai (Inactive) -->
        <div class="relative z-10 flex flex-col items-center w-16">
          <div
            class="flex h-7 w-7 items-center justify-center rounded-full border border-gray-200 bg-white text-xs font-medium text-gray-400"
          >
            4
          </div>
          <span class="mt-2 text-[10px] font-medium text-gray-400 text-center"
            >Selesai</span
          >
        </div>
      </div>

      <!-- Form Step 2 -->
      <form
        class="mt-6 space-y-6"
        action="register-verification.html"
        method="GET"
      >
        <!-- PIN Transaksi Berbasis Kotak-Kotak (OTP Style) -->
        <div class="py-8 flex flex-col items-center justify-center">
          <label class="mb-6 block text-center text-sm font-bold text-gray-800"
            >Buat PIN Transaksi Keamanan (6 Digit)</label
          >
          <div class="flex justify-center gap-2 sm:gap-3 mb-4" id="pin-container">
            <input
              type="password"
              maxlength="1"
              class="pin-box h-12 w-10 rounded-xl border border-gray-200 bg-white text-center text-xl font-bold shadow-sm outline-none transition-all focus:border-gray-400 focus:ring-2 focus:ring-[#A8E034]/20 sm:h-14 sm:w-12"
              required
            />
            <input
              type="password"
              maxlength="1"
              class="pin-box h-12 w-10 rounded-xl border border-gray-200 bg-white text-center text-xl font-bold shadow-sm outline-none transition-all focus:border-gray-400 focus:ring-2 focus:ring-[#A8E034]/20 sm:h-14 sm:w-12"
              required
            />
            <input
              type="password"
              maxlength="1"
              class="pin-box h-12 w-10 rounded-xl border border-gray-200 bg-white text-center text-xl font-bold shadow-sm outline-none transition-all focus:border-gray-400 focus:ring-2 focus:ring-[#A8E034]/20 sm:h-14 sm:w-12"
              required
            />
            <input
              type="password"
              maxlength="1"
              class="pin-box h-12 w-10 rounded-xl border border-gray-200 bg-white text-center text-xl font-bold shadow-sm outline-none transition-all focus:border-gray-400 focus:ring-2 focus:ring-[#A8E034]/20 sm:h-14 sm:w-12"
              required
            />
            <input
              type="password"
              maxlength="1"
              class="pin-box h-12 w-10 rounded-xl border border-gray-200 bg-white text-center text-xl font-bold shadow-sm outline-none transition-all focus:border-gray-400 focus:ring-2 focus:ring-[#A8E034]/20 sm:h-14 sm:w-12"
              required
            />
            <input
              type="password"
              maxlength="1"
              class="pin-box h-12 w-10 rounded-xl border border-gray-200 bg-white text-center text-xl font-bold shadow-sm outline-none transition-all focus:border-gray-400 focus:ring-2 focus:ring-[#A8E034]/20 sm:h-14 sm:w-12"
              required
            />
          </div>
          <p class="text-center text-xs text-gray-400">
            PIN ini digunakan untuk keamanan masuk akun dan transaksi SnapCash Anda.
          </p>
          <!-- Hidden Input untuk menyimpan hasil akhir PIN -->
          <input type="hidden" name="pin" id="final-pin" />
        </div>

        <button
          type="submit"
          class="mt-8 flex w-full items-center justify-center gap-2 rounded-xl bg-[#A8E034] px-4 py-3.5 font-bold text-gray-900 shadow-sm transition-colors hover:bg-[#97cf29] focus:outline-none focus:ring-2 focus:ring-[#A8E034]/40 active:bg-[#86b824]"
        >
          <span>Lanjut ke Verifikasi</span>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M14 5l7 7m0 0l-7 7m7-7H3"
            />
          </svg>
        </button>
      </form>

      <div class="mt-6 text-center">
        <a
          href="register.html"
          class="inline-flex items-center gap-2 text-xs font-bold text-gray-800 transition-colors hover:text-gray-950"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-3.5 w-3.5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M10 19l-7-7m0 0l7-7m-7 7h18"
            />
          </svg>
          <span>Kembali ke Langkah Sebelumnya</span>
        </a>
      </div>

      </div>

      <div
        class="mt-8 flex items-center justify-center gap-1.5 border-t border-gray-50 pt-4 text-[10px] font-medium text-gray-400"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-3.5 w-3.5 text-gray-400"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z"
          />
        </svg>
        <span>Data dilindungi enkripsi end-to-end</span>
      </div>
    </div>

    <!-- Script Interaktif PIN Boxes -->
    <script>
      // Auto-focus behavior untuk PIN Boxes
      const pinBoxes = document.querySelectorAll(".pin-box");
      const finalPinInput = document.getElementById("final-pin");

      pinBoxes.forEach((box, index) => {
        box.addEventListener("input", (e) => {
          // Hanya izinkan angka
          e.target.value = e.target.value.replace(/[^0-9]/g, "");

          if (e.target.value !== "") {
            // Pindah ke kotak berikutnya jika ada
            if (index < pinBoxes.length - 1) {
              pinBoxes[index + 1].focus();
            }
          }
          updateFinalPin();
        });

        box.addEventListener("keydown", (e) => {
          if (e.key === "Backspace" && e.target.value === "") {
            // Jika menekan backspace dan kosong, pindah ke kiri
            if (index > 0) {
              pinBoxes[index - 1].focus();
              pinBoxes[index - 1].value = "";
            }
          }
          updateFinalPin();
        });
      });

      function updateFinalPin() {
        let pin = "";
        pinBoxes.forEach((box) => {
          pin += box.value;
        });
        finalPinInput.value = pin;
      }
    </script>
  </body>
</html>

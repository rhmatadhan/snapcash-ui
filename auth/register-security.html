<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keamanan Registrasi - SnapCash</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../dist/css/style.css" />
  </head>
  <body class="bg-[#F4F5F7] flex min-h-screen items-center justify-center font-sans px-4 py-8">
    <div class="bg-white w-full max-w-[560px] rounded-[24px] p-8 md:p-12 shadow-[0_8px_30px_rgb(0,0,0,0.03)] border border-gray-100/50">
      
      <div class="text-center">
        <h1 class="text-xl md:text-2xl font-bold text-gray-900 tracking-tight">Buat Akun SnapCash</h1>
        <p class="text-xs md:text-sm text-gray-500 mt-2 font-medium">Mulai langkahmu menuju kebebasan dan kemudahan finansial.</p>
      </div>

      <!-- Stepper (4 Steps) -->
      <div class="flex items-center justify-center gap-1 md:gap-2 mt-6 py-4">
        <!-- Step 1: Identitas (Completed) -->
        <div class="flex items-center">
          <div class="w-6 h-6 md:w-7 md:h-7 rounded-full bg-[#A8E034] text-gray-900 flex items-center justify-center shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 md:h-4 md:w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
          </div>
          <span class="text-[10px] md:text-xs font-semibold text-gray-900 ml-1.5 md:ml-2">Identitas</span>
        </div>

        <div class="w-4 md:w-8 h-[1px] bg-[#A8E034] mx-1 md:mx-2"></div>

        <!-- Step 2: Keamanan (Active) -->
        <div class="flex items-center">
          <div class="w-6 h-6 md:w-7 md:h-7 rounded-full bg-[#A8E034] text-gray-900 font-bold flex items-center justify-center text-[10px] md:text-xs shadow-sm shadow-[#A8E034]/20">
            2
          </div>
          <span class="text-[10px] md:text-xs font-semibold text-gray-900 ml-1.5 md:ml-2 hidden sm:inline">Keamanan</span>
        </div>

        <div class="w-4 md:w-8 h-[1px] bg-gray-200 mx-1 md:mx-2"></div>

        <!-- Step 3: Verifikasi (Inactive) -->
        <div class="flex items-center">
          <div class="w-6 h-6 md:w-7 md:h-7 rounded-full border border-gray-200 text-gray-400 font-medium flex items-center justify-center text-[10px] md:text-xs bg-white">
            3
          </div>
          <span class="text-[10px] md:text-xs font-medium text-gray-400 ml-1.5 md:ml-2 hidden sm:inline">Verifikasi</span>
        </div>

        <div class="w-4 md:w-8 h-[1px] bg-gray-200 mx-1 md:mx-2"></div>

        <!-- Step 4: Selesai -->
        <div class="flex items-center">
          <div class="w-6 h-6 md:w-7 md:h-7 rounded-full border border-gray-200 text-gray-400 font-medium flex items-center justify-center text-[10px] md:text-xs bg-white">
            4
          </div>
        </div>
      </div>

      <!-- Form Step 2 -->
      <form class="space-y-6 mt-6" action="register-verification.html" method="GET">
        
        <!-- Kata Sandi -->
        <div>
          <label for="password" class="block text-xs font-bold text-gray-800 mb-2">Kata Sandi Akun</label>
          <div class="relative rounded-xl border border-gray-200 focus-within:border-gray-400 focus-within:ring-2 focus-within:ring-[#A8E034]/20 transition-all bg-white">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2v4a2 2 0 01-2 2H9a2 2 0 01-2-2V9a2 2 0 012-2m6 0V5a3 3 0 10-6 0v2m6 0H9" />
              </svg>
            </div>
            <input type="password" id="password" name="password" minlength="8" class="block w-full pl-11 pr-12 py-3.5 text-sm text-gray-800 placeholder-gray-400 bg-transparent rounded-xl outline-none" placeholder="Masukkan kata sandi (min. 8 karakter)" required />
            <button type="button" onclick="togglePasswordVisibility('password')" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600 focus:outline-none">
              <svg id="password-eye-open" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
              <svg id="password-eye-closed" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Konfirmasi Kata Sandi -->
        <div>
          <label for="password_confirmation" class="block text-xs font-bold text-gray-800 mb-2">Konfirmasi Kata Sandi</label>
          <div class="relative rounded-xl border border-gray-200 focus-within:border-gray-400 focus-within:ring-2 focus-within:ring-[#A8E034]/20 transition-all bg-white">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
              </svg>
            </div>
            <input type="password" id="password_confirmation" name="password_confirmation" minlength="8" class="block w-full pl-11 pr-12 py-3.5 text-sm text-gray-800 placeholder-gray-400 bg-transparent rounded-xl outline-none" placeholder="Ulangi kata sandi" required />
            <button type="button" onclick="togglePasswordVisibility('password_confirmation')" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600 focus:outline-none">
              <svg id="password_confirmation-eye-open" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
              <svg id="password_confirmation-eye-closed" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
              </svg>
            </button>
          </div>
        </div>

        <div class="h-[1px] bg-gray-100 my-4"></div>

        <!-- PIN Transaksi Berbasis Kotak-Kotak (OTP Style) -->
        <div>
          <label class="block text-xs font-bold text-gray-800 mb-4 text-center">Buat PIN Transaksi (6 Digit)</label>
          <div class="flex justify-center gap-2 sm:gap-3" id="pin-container">
            <input type="password" maxlength="1" class="pin-box w-10 h-12 sm:w-12 sm:h-14 text-center text-xl font-bold rounded-xl border border-gray-200 focus:border-gray-400 focus:ring-2 focus:ring-[#A8E034]/20 outline-none bg-white transition-all shadow-sm" required>
            <input type="password" maxlength="1" class="pin-box w-10 h-12 sm:w-12 sm:h-14 text-center text-xl font-bold rounded-xl border border-gray-200 focus:border-gray-400 focus:ring-2 focus:ring-[#A8E034]/20 outline-none bg-white transition-all shadow-sm" required>
            <input type="password" maxlength="1" class="pin-box w-10 h-12 sm:w-12 sm:h-14 text-center text-xl font-bold rounded-xl border border-gray-200 focus:border-gray-400 focus:ring-2 focus:ring-[#A8E034]/20 outline-none bg-white transition-all shadow-sm" required>
            <input type="password" maxlength="1" class="pin-box w-10 h-12 sm:w-12 sm:h-14 text-center text-xl font-bold rounded-xl border border-gray-200 focus:border-gray-400 focus:ring-2 focus:ring-[#A8E034]/20 outline-none bg-white transition-all shadow-sm" required>
            <input type="password" maxlength="1" class="pin-box w-10 h-12 sm:w-12 sm:h-14 text-center text-xl font-bold rounded-xl border border-gray-200 focus:border-gray-400 focus:ring-2 focus:ring-[#A8E034]/20 outline-none bg-white transition-all shadow-sm" required>
            <input type="password" maxlength="1" class="pin-box w-10 h-12 sm:w-12 sm:h-14 text-center text-xl font-bold rounded-xl border border-gray-200 focus:border-gray-400 focus:ring-2 focus:ring-[#A8E034]/20 outline-none bg-white transition-all shadow-sm" required>
          </div>
          <!-- Hidden Input untuk menyimpan hasil akhir PIN -->
          <input type="hidden" name="pin" id="final-pin">
        </div>

        <button type="submit" class="w-full bg-[#A8E034] hover:bg-[#97cf29] active:bg-[#86b824] text-gray-900 font-bold py-3.5 px-4 rounded-xl flex items-center justify-center gap-2 mt-8 transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-[#A8E034]/40">
          <span>Lanjut ke Verifikasi</span>
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
          </svg>
        </button>
      </form>

      <div class="text-center mt-6">
        <a href="register.html" class="inline-flex items-center gap-2 text-xs font-bold text-gray-800 hover:text-gray-950 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
          <span>Kembali ke Langkah Sebelumnya</span>
        </a>
      </div>

      <div class="flex items-center justify-center gap-1.5 text-[10px] text-gray-400 font-medium mt-8 pt-4 border-t border-gray-50">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
        <span>Data dilindungi enkripsi end-to-end</span>
      </div>
    </div>

    <!-- Script Interaktif PIN Boxes dan Toggling Password -->
    <script>
      // Toggle Password
      function togglePasswordVisibility(fieldId) {
        const input = document.getElementById(fieldId);
        const eyeOpen = document.getElementById(`${fieldId}-eye-open`);
        const eyeClosed = document.getElementById(`${fieldId}-eye-closed`);
        if (input.type === 'password') {
          input.type = 'text';
          eyeOpen.classList.add('hidden');
          eyeClosed.classList.remove('hidden');
        } else {
          input.type = 'password';
          eyeOpen.classList.remove('hidden');
          eyeClosed.classList.add('hidden');
        }
      }

      // Auto-focus behavior untuk PIN Boxes
      const pinBoxes = document.querySelectorAll('.pin-box');
      const finalPinInput = document.getElementById('final-pin');

      pinBoxes.forEach((box, index) => {
        box.addEventListener('input', (e) => {
          // Hanya izinkan angka
          e.target.value = e.target.value.replace(/[^0-9]/g, '');
          
          if (e.target.value !== '') {
            // Pindah ke kotak berikutnya jika ada
            if (index < pinBoxes.length - 1) {
              pinBoxes[index + 1].focus();
            }
          }
          updateFinalPin();
        });

        box.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && e.target.value === '') {
            // Jika menekan backspace dan kosong, pindah ke kiri
            if (index > 0) {
              pinBoxes[index - 1].focus();
              pinBoxes[index - 1].value = '';
            }
          }
          updateFinalPin();
        });
      });

      function updateFinalPin() {
        let pin = '';
        pinBoxes.forEach(box => {
          pin += box.value;
        });
        finalPinInput.value = pin;
      }
    </script>
  </body>
</html>

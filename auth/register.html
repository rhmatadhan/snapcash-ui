<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Identitas Registrasi - SnapCash</title>
    <!-- Load Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Load Tailwind CSS -->
    <link rel="stylesheet" href="../dist/css/style.css" />
  </head>
  <body class="bg-[#F4F5F7] flex min-h-screen items-center justify-center font-sans px-4 py-8">
    <div class="bg-white w-full max-w-[560px] rounded-[24px] p-8 md:p-12 shadow-[0_8px_30px_rgb(0,0,0,0.03)] border border-gray-100/50">
      
      <!-- Header -->
      <div class="text-center">
        <h1 class="text-xl md:text-2xl font-bold text-gray-900 tracking-tight">Buat Akun SnapCash</h1>
        <p class="text-xs md:text-sm text-gray-500 mt-2 font-medium">
          Mulai langkahmu menuju kebebasan dan kemudahan finansial.
        </p>
      </div>

      <!-- Stepper (4 Steps) -->
      <div class="flex items-center justify-center gap-1 md:gap-2 mt-6 py-4">
        <!-- Step 1: Identitas -->
        <div class="flex items-center">
          <div class="w-6 h-6 md:w-7 md:h-7 rounded-full bg-[#A8E034] text-gray-900 font-bold flex items-center justify-center text-[10px] md:text-xs shadow-sm shadow-[#A8E034]/20">
            1
          </div>
          <span class="text-[10px] md:text-xs font-semibold text-gray-900 ml-1.5 md:ml-2">Identitas</span>
        </div>

        <div class="w-4 md:w-8 h-[1px] bg-gray-200 mx-1 md:mx-2"></div>

        <!-- Step 2: Keamanan -->
        <div class="flex items-center">
          <div class="w-6 h-6 md:w-7 md:h-7 rounded-full border border-gray-200 text-gray-400 font-medium flex items-center justify-center text-[10px] md:text-xs bg-white">
            2
          </div>
          <span class="text-[10px] md:text-xs font-medium text-gray-400 ml-1.5 md:ml-2 hidden sm:inline">Keamanan</span>
        </div>

        <div class="w-4 md:w-8 h-[1px] bg-gray-200 mx-1 md:mx-2"></div>

        <!-- Step 3: Verifikasi -->
        <div class="flex items-center">
          <div class="w-6 h-6 md:w-7 md:h-7 rounded-full border border-gray-200 text-gray-400 font-medium flex items-center justify-center text-[10px] md:text-xs bg-white">
            3
          </div>
          <span class="text-[10px] md:text-xs font-medium text-gray-400 ml-1.5 md:ml-2 hidden sm:inline">Verifikasi</span>
        </div>

        <div class="w-4 md:w-8 h-[1px] bg-gray-200 mx-1 md:mx-2"></div>

        <!-- Step 4: Selesai -->
        <div class="flex items-center">
          <div class="w-6 h-6 md:w-7 md:h-7 rounded-full border border-gray-200 text-gray-400 font-medium flex items-center justify-center text-[10px] md:text-xs bg-white">
            4
          </div>
        </div>
      </div>

      <!-- Form Step 1 -->
      <form class="space-y-5 mt-6" action="register-security.html" method="GET">
        <!-- Nama Lengkap -->
        <div>
          <label for="nama-lengkap" class="block text-xs font-bold text-gray-800 mb-2">Nama Lengkap</label>
          <div class="relative rounded-xl border border-gray-200 focus-within:border-gray-400 focus-within:ring-2 focus-within:ring-[#A8E034]/20 transition-all bg-white">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </div>
            <input
              type="text"
              id="nama-lengkap"
              name="nama-lengkap"
              class="block w-full pl-11 pr-4 py-3.5 text-sm text-gray-800 placeholder-gray-400 bg-transparent rounded-xl outline-none"
              placeholder="Contoh: Budi Santoso"
              required
            />
          </div>
        </div>

        <!-- Alamat Email -->
        <div>
          <label for="email" class="block text-xs font-bold text-gray-800 mb-2">Alamat Email</label>
          <div class="relative rounded-xl border border-gray-200 focus-within:border-gray-400 focus-within:ring-2 focus-within:ring-[#A8E034]/20 transition-all bg-white">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
              </svg>
            </div>
            <input
              type="email"
              id="email"
              name="email"
              class="block w-full pl-11 pr-4 py-3.5 text-sm text-gray-800 placeholder-gray-400 bg-transparent rounded-xl outline-none"
              placeholder="nama@email.com"
              required
            />
          </div>
        </div>

        <!-- Nomor WhatsApp / HP -->
        <div>
          <label for="whatsapp" class="block text-xs font-bold text-gray-800 mb-2">Nomor WhatsApp / HP</label>
          <div class="flex rounded-xl border border-gray-200 focus-within:border-gray-400 focus-within:ring-2 focus-within:ring-[#A8E034]/20 transition-all bg-white overflow-hidden">
            <div class="flex items-center justify-center px-4 bg-gray-50 border-r border-gray-200 text-sm font-semibold text-gray-700 min-w-[60px]">
              +62
            </div>
            <input
              type="tel"
              id="whatsapp"
              name="whatsapp"
              class="block w-full px-4 py-3.5 text-sm text-gray-800 placeholder-gray-400 bg-transparent outline-none"
              placeholder="812-3456-7890"
              pattern="[0-9\- ]{8,15}"
              required
            />
          </div>
        </div>

        <!-- Button Lanjut -->
        <button
          type="submit"
          class="w-full bg-[#A8E034] hover:bg-[#97cf29] active:bg-[#86b824] text-gray-900 font-bold py-3.5 px-4 rounded-xl flex items-center justify-center gap-2 mt-8 transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-[#A8E034]/40"
        >
          <span>Lanjut ke Keamanan</span>
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
          </svg>
        </button>
      </form>

      <!-- Sudah punya akun? Masuk -->
      <div class="text-center mt-6">
        <p class="text-xs text-gray-500 font-medium">
          Sudah punya akun? 
          <a href="#" class="text-gray-900 font-bold hover:underline">Masuk di sini</a>
        </p>
      </div>

      <!-- Footer Keamanan -->
      <div class="flex items-center justify-center gap-1.5 text-[10px] text-gray-400 font-medium mt-8 pt-4 border-t border-gray-50">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
        <span>Data dilindungi enkripsi end-to-end</span>
      </div>
    </div>
  </body>
</html>

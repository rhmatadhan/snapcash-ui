<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masuk - SnapCash</title>
    <!-- Load Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Load Tailwind CSS -->
    <link rel="stylesheet" href="../dist/css/style.css" />
  </head>
  <body
    class="flex min-h-screen items-center justify-center bg-[#F4F5F7] px-4 py-8 font-sans"
  >
    <div
      class="flex w-full max-w-[560px] flex-col rounded-[24px] border border-gray-100/50 bg-white p-8 shadow-[0_8px_30px_rgb(0,0,0,0.03)] md:p-12"
    >
      <!-- Logo SnapCash -->
      <div class="mb-6 flex items-center justify-center">
        <span class="text-2xl font-extrabold tracking-tight text-gray-900">
          SnapCash<span class="text-[#A8E034]">.</span>
        </span>
      </div>

      <!-- Header -->
      <div class="mb-8 text-center">
        <h1 class="text-xl font-bold tracking-tight text-gray-900 md:text-2xl">
          Selamat Datang Kembali!
        </h1>
        <p class="mt-2 text-xs font-medium text-gray-500 md:text-sm">
          Masuk untuk mengelola saldo dan transaksimu
        </p>
      </div>

      <!-- Form Login -->
      <form class="space-y-5" action="../index.html" method="GET">
        <!-- Email atau Nomor HP -->
        <div>
          <label
            for="username"
            class="mb-2 block text-xs font-bold text-gray-800"
            >Email atau Nomor HP</label
          >
          <div
            class="relative rounded-xl border border-gray-200 bg-white transition-all focus-within:border-gray-400 focus-within:ring-2 focus-within:ring-[#A8E034]/20"
          >
            <div
              class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5 text-gray-400"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="1.8"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                />
              </svg>
            </div>
            <input
              type="text"
              id="username"
              name="username"
              class="block w-full rounded-xl bg-transparent py-3.5 pl-11 pr-4 text-sm text-gray-800 placeholder-gray-400 outline-none"
              placeholder="john@example.com / 081234567890"
              required
            />
          </div>
        </div>

        <!-- Password -->
        <div>
          <div class="mb-2 flex items-center justify-between">
            <label for="password" class="block text-xs font-bold text-gray-800"
              >Password</label
            >
            <a
              href="#"
              class="text-xs font-bold text-[#86b824] transition-colors hover:text-[#75a31f]"
              >Lupa Password?</a
            >
          </div>
          <div
            class="relative rounded-xl border border-gray-200 bg-white transition-all focus-within:border-gray-400 focus-within:ring-2 focus-within:ring-[#A8E034]/20"
          >
            <div
              class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5 text-gray-400"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="1.8"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M15 7a2 2 0 012 2v4a2 2 0 01-2 2H9a2 2 0 01-2-2V9a2 2 0 012-2m6 0V5a3 3 0 10-6 0v2m6 0H9"
                />
              </svg>
            </div>
            <input
              type="password"
              id="password"
              name="password"
              class="block w-full rounded-xl bg-transparent py-3.5 pl-11 pr-12 text-sm text-gray-800 placeholder-gray-400 outline-none"
              placeholder="••••••••"
              required
            />
            <button
              type="button"
              onclick="togglePasswordVisibility()"
              class="absolute inset-y-0 right-0 flex items-center pr-4 text-gray-400 hover:text-gray-600 focus:outline-none"
            >
              <svg
                id="password-eye-open"
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="1.8"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                />
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                />
              </svg>
              <svg
                id="password-eye-closed"
                xmlns="http://www.w3.org/2000/svg"
                class="hidden h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="1.8"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"
                />
              </svg>
            </button>
          </div>
        </div>

        <!-- Checkbox Ingat Saya -->
        <div class="flex items-center">
          <input
            type="checkbox"
            id="remember-me"
            name="remember-me"
            class="h-4 w-4 cursor-pointer rounded border-gray-300 text-[#A8E034] transition-all focus:ring-[#A8E034]"
          />
          <label
            for="remember-me"
            class="ml-2 cursor-pointer select-none text-xs font-medium text-gray-500"
          >
            Ingat saya di perangkat ini
          </label>
        </div>

        <!-- Button Masuk Sekarang -->
        <button
          type="submit"
          class="mt-8 flex w-full items-center justify-center gap-2 rounded-xl bg-[#A8E034] px-4 py-3.5 font-bold text-gray-900 shadow-sm transition-colors hover:bg-[#97cf29] focus:outline-none focus:ring-2 focus:ring-[#A8E034]/40 active:bg-[#86b824]"
        >
          <span>MASUK SEKARANG</span>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M14 5l7 7m0 0l-7 7m7-7H3"
            />
          </svg>
        </button>
      </form>

      <!-- Divider -->
      <div class="relative flex items-center py-5">
        <div class="flex-grow border-t border-gray-200"></div>
        <span class="mx-4 flex-shrink text-xs font-semibold text-gray-400"
          >Atau</span
        >
        <div class="flex-grow border-t border-gray-200"></div>
      </div>

      <!-- Google Login Button -->
      <button
        type="button"
        class="flex w-full items-center justify-center gap-2.5 rounded-xl border border-gray-200 px-4 py-3.5 font-semibold text-gray-700 transition-colors hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-gray-200 active:bg-gray-100"
      >
        <svg
          class="h-5 w-5"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4"
          />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853"
          />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"
            fill="#FBBC05"
          />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"
            fill="#EA4335"
          />
        </svg>
        <span>Masuk dengan Google</span>
      </button>

      <!-- Footer & Teks Bantuan Pendaftaran (Semua di dalam Card) -->
      <div
        class="mt-8 flex flex-col items-center gap-4 border-t border-gray-50 pt-6 text-center"
      >
        <!-- Status Keamanan -->
        <div
          class="flex items-center gap-1.5 text-[10px] font-medium text-gray-400"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-3.5 w-3.5 text-gray-400"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z"
            />
          </svg>
          <span>Dilindungi oleh Enkripsi 256-bit SnapCash Guard</span>
        </div>

        <!-- Teks Bantuan Sign Up -->
        <p class="text-xs font-medium text-gray-500">
          Belum punya akun?
          <a
            href="register.html"
            class="font-bold text-gray-900 hover:underline"
            >Daftar di sini</a
          >
        </p>
      </div>
    </div>

    <!-- Script Toggling Password -->
    <script>
      function togglePasswordVisibility() {
        const input = document.getElementById("password");
        const eyeOpen = document.getElementById("password-eye-open");
        const eyeClosed = document.getElementById("password-eye-closed");
        if (input.type === "password") {
          input.type = "text";
          eyeOpen.classList.add("hidden");
          eyeClosed.classList.remove("hidden");
        } else {
          input.type = "password";
          eyeOpen.classList.remove("hidden");
          eyeClosed.classList.add("hidden");
        }
      }
    </script>
  </body>
</html>
